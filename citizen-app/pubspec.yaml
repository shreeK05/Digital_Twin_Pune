name: pune_urban_shield_citizen
description: Pune Urban Shield - Citizen Alert & Safety App for PMC & PCMC
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  http: ^1.2.0
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  
  # State & Storage
  shared_preferences: ^2.2.3
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Photo Picker (for report image upload)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
